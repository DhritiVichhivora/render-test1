<!DOCTYPE html>
<html>
<head>
    <title>Student Data App</title>
</head>

<body>

<h2>Enter Student Details</h2>

<form action="/submit" method="POST">

<label>Name:</label><br>
<input type="text" name="name" required><br><br>

<label>SAP ID:</label><br>
<input type="text" name="sapid" required><br><br>

<label>Age:</label><br>
<input type="number" name="age" required><br><br>

<label>Marks:</label><br>
<input type="number" name="marks" required><br><br>

<button type="submit">Submit</button>

</form>

<h2>Submitted Data</h2>

{% if users %}
<table border="1">
<tr>
<th>Name</th>
<th>SAP ID</th>
<th>Age</th>
<th>Marks</th>
</tr>

{% for user in users %}
<tr>
<td>{{ user.name }}</td>
<td>{{ user.sapid }}</td>
<td>{{ user.age }}</td>
<td>{{ user.marks }}</td>
</tr>
{% endfor %}

</table>
{% endif %}

</body>
</html>
